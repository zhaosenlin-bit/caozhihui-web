<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmic Defender — Across the Universe</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            heading: ['"Instrument Serif"', 'serif'],
            body: ['Barlow', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    html, body { background:#000; color:#fff; }
    body { font-family: 'Barlow', sans-serif; margin:0; }
    .font-heading { font-family: 'Instrument Serif', serif; }

    .hud-chip {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 18px;
      padding: 10px 18px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.10), 0 4px 14px rgba(0,0,0,0.35);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity .55s ease, transform .55s ease;
    }
    .hud-chip.in { opacity: 1; transform: translateY(0); }
    .pill-btn {
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 9999px;
      padding: 8px 18px;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.12);
      transition: background .15s ease, transform .15s ease;
      opacity: 0;
      transform: translateY(-8px);
    }
    .pill-btn.in { opacity: 1; transform: translateY(0); }
    .pill-btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .pill-btn:active { transform: translateY(0); }

    /* Pulse ring on Start Game button while idle */
    #btnStart.cta {
      position: relative;
      overflow: visible;
    }
    #btnStart.cta::after {
      content: "";
      position: absolute;
      inset: -2px;
      border-radius: 9999px;
      border: 1px solid rgba(253,230,138,0.7);
      opacity: 0;
      animation: ctaPulse 1.8s ease-out infinite;
      pointer-events: none;
    }
    @keyframes ctaPulse {
      0%   { opacity: 0.85; transform: scale(1); }
      80%  { opacity: 0;    transform: scale(1.18); }
      100% { opacity: 0;    transform: scale(1.18); }
    }

    canvas#stage {
      display:block;
      width: min(1100px, 96vw);
      height: min(620px, 70vh);
      margin: 0 auto;
      border-radius: 22px;
      background: radial-gradient(ellipse at center, #0b0f1e 0%, #000 70%);
      box-shadow: inset 0 0 80px rgba(80,120,255,0.08), 0 10px 40px rgba(0,0,0,0.6);
      touch-action: none;
    }

    .rounded { border-radius: 9999px !important; }

    .combo-pop {
      animation: comboPop 0.4s ease-out;
    }
    @keyframes comboPop {
      0%   { transform: scale(1); color:#fff; }
      50%  { transform: scale(1.35); color:#fde68a; }
      100% { transform: scale(1); color:#fff; }
    }
    .blink { animation: blink 0.9s linear infinite; }
    @keyframes blink {
      0%,49% { opacity:1; }
      50%,100% { opacity:0.25; }
    }
    .help-key {
      display:inline-block; min-width: 1.6em; text-align:center;
      border:1px solid rgba(255,255,255,0.25); border-radius:6px;
      padding: 1px 6px; font-size: 0.85em; background: rgba(255,255,255,0.05);
    }

    /* Banner fade-in helper (set by JS) */
    #banner.fade { transition: opacity .5s ease; }
  </style>
</head>
<body class="font-body text-white antialiased">

  <div class="max-w-[1200px] mx-auto px-4 pt-6 pb-3">
    <!-- Top HUD -->
    <div class="flex items-start justify-between gap-3 flex-wrap">
      <div class="flex gap-3">
        <div class="hud-chip">
          <div class="text-[10px] tracking-[0.25em] opacity-60">SCORE</div>
          <div id="score" class="text-2xl font-heading italic leading-none">0</div>
        </div>
        <div class="hud-chip">
          <div class="text-[10px] tracking-[0.25em] opacity-60">LIVES</div>
          <div id="lives" class="text-2xl font-heading italic leading-none">♥♥♥</div>
        </div>
        <div class="hud-chip">
          <div class="text-[10px] tracking-[0.25em] opacity-60">COMBO</div>
          <div id="combo" class="text-2xl font-heading italic leading-none">x1</div>
        </div>
      </div>

      <div class="text-center hud-chip" style="background:transparent; box-shadow:none; backdrop-filter:none;">
        <h1 class="font-heading italic text-4xl md:text-5xl leading-none">Cosmic Defender.</h1>
        <p class="text-sm opacity-70 mt-2">Blast the asteroids. Survive 60 seconds. Don't lose all three hearts.</p>
      </div>

      <div class="flex gap-3 items-start">
        <div class="hud-chip">
          <div class="text-[10px] tracking-[0.25em] opacity-60">TIME</div>
          <div id="time" class="text-2xl font-heading italic leading-none">60s</div>
        </div>
        <div class="hud-chip">
          <div class="text-[10px] tracking-[0.25em] opacity-60">BEST</div>
          <div id="best" class="text-2xl font-heading italic leading-none">0</div>
        </div>
        <a href="./" class="pill-btn text-sm self-start mt-1">Back Home</a>
      </div>
    </div>
  </div>

  <!-- Game stage -->
  <canvas id="stage" width="1100" height="620" aria-label="Cosmic Defender game stage"></canvas>

  <!-- Bottom controls/help -->
  <div class="max-w-[1100px] mx-auto px-4 mt-4 flex flex-wrap items-center justify-between gap-3">
    <div class="text-sm opacity-80">
      <span class="help-key">&larr;</span> <span class="help-key">&rarr;</span> move &nbsp;·&nbsp;
      <span class="help-key">A</span> <span class="help-key">D</span> move &nbsp;·&nbsp;
      <span class="help-key">Space</span> / click fire &nbsp;·&nbsp;
      <span class="help-key">P</span> pause &nbsp;·&nbsp;
      <span class="help-key">R</span> restart
    </div>
    <div class="flex gap-2">
      <button id="btnStart" class="pill-btn text-sm cta">Start Game</button>
      <button id="btnPause" class="pill-btn text-sm">Pause</button>
      <button id="btnReset" class="pill-btn text-sm">Restart</button>
    </div>
  </div>

  <div id="banner" class="fade text-center mt-3 text-sm opacity-80">Press Start Game to begin the 60 second round.</div>

  <script src="./game2.js?v=4"></script>
</body>
</html>
