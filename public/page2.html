<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D 探索 — 宇宙探索</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="./vendor/tailwind.css" />

  <!-- model-viewer for real NASA .glb 3D models -->
  <script type="module" src="https://unpkg.com/@google/model-viewer@4.0.0/dist/model-viewer.min.js"></script>

  <script src="./vendor/react.production.min.js"></script>
  <script src="./vendor/react-dom.production.min.js"></script>
  <script>window.Motion = window.FramerMotion;</script>
  <script src="./vendor/framer-motion.js"></script>
  <script type="module" src="./pixelsnow.mjs"></script>

  <style>
    body { background: #000; margin: 0; }
    .font-heading { font-family: "Instrument Serif", serif; }
    .font-body { font-family: Inter, sans-serif; }
    .liquid-glass {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: none;
      box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
      position: relative; overflow: hidden;
    }
    .liquid-glass::before {
      content: ""; position: absolute; inset: 0;
      border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.45) 0%, rgba(255,255,255,0.15) 20%, rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%, rgba(255,255,255,0.15) 80%, rgba(255,255,255,0.45) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }
    .liquid-glass-strong {
      background: rgba(255,255,255,0.01);
      background-blend-mode: luminosity;
      backdrop-filter: blur(50px);
      -webkit-backdrop-filter: blur(50px);
      box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
      position: relative; overflow: hidden;
    }
    .liquid-glass-strong::before {
      content: ""; position: absolute; inset: 0;
      border-radius: inherit; padding: 1.4px;
      background: linear-gradient(180deg,
        rgba(255,255,255,0.5) 0%, rgba(255,255,255,0.2) 20%, rgba(255,255,255,0) 40%,
        rgba(255,255,255,0) 60%, rgba(255,255,255,0.2) 80%, rgba(255,255,255,0.5) 100%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
              mask-composite: exclude;
      pointer-events: none;
    }
    model-viewer { width: 100%; height: 100%; --poster-color: transparent; background: transparent; }
    .rounded { border-radius: 9999px !important; }
    .bg-nebula {
      background:
        radial-gradient(ellipse 800px 600px at 20% 25%, rgba(122, 90, 248, 0.35), transparent 60%),
        radial-gradient(ellipse 700px 500px at 80% 60%, rgba(58, 134, 255, 0.30), transparent 60%),
        radial-gradient(ellipse 600px 400px at 50% 90%, rgba(232, 122, 232, 0.25), transparent 60%),
        radial-gradient(ellipse 900px 700px at 70% 15%, rgba(64, 200, 255, 0.18), transparent 60%),
        linear-gradient(180deg, #050216 0%, #0a0420 50%, #050214 100%);
    }
    .bg-stars {
      background-image:
        radial-gradient(1px 1px at 25% 30%, #fff 50%, transparent 51%),
        radial-gradient(1px 1px at 80% 80%, #fff 50%, transparent 51%),
        radial-gradient(1.5px 1.5px at 50% 50%, #cfd8ff 50%, transparent 51%),
        radial-gradient(1px 1px at 70% 20%, #fff 50%, transparent 51%);
      background-size: 800px 800px;
    }
  </style>
</head>
<body class="font-body text-white antialiased">
  <div id="root" style="position:relative; z-index:1;"></div>
  <style>
    #pixelsnow-bg {
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }
    #pixelsnow-bg canvas { display: block; width: 100%; height: 100%; }
  </style>
  <div id="pixelsnow-bg"></div>
  <script src="./explore.js?v=mark3"></script>
  <script type="module">
    queueMicrotask(() => {
      if (!window.PixelSnow || !window.PixelSnow.mount) {
        console.warn("[page2] PixelSnow module not loaded");
        return;
      }
      const container = document.getElementById("pixelsnow-bg");
      const fit = () => {
        container.style.width = window.innerWidth + "px";
        container.style.height = Math.max(document.body.scrollHeight, window.innerHeight) + "px";
      };
      fit();
      window.addEventListener("resize", fit);
      window.__page2PixelSnowHandle = window.PixelSnow.mount(container, {
        color: "#ffffff",
        flakeSize: 0.01,
        minFlakeSize: 1.25,
        pixelResolution: 200,
        speed: 1.25,
        density: 0.3,
        direction: 125,
        brightness: 1,
      });
    });
  </script>
</body>
</html>
